name: ShiJian
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    INFOPLIST_FILE: ShiJian/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.example.shijian
    DEVELOPMENT_TEAM: ""

targets:
  ShiJian:
    type: application
    platform: macOS
    sources:
      - path: ShiJian
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_NAME: "诗笺"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies: []
